# CI for the Inkwell repo.
#
# Two independent jobs run in parallel:
#
#   • frontend — TypeScript: shared types + extension build / lint / typecheck
#   • backend  — Python (FastAPI): lint / typecheck / tests
#
# A merge to main is blocked until both jobs are green. Each job's
# working-directory is pinned to its own subtree (frontend/ or backend/),
# so the two toolchains never share a checkout-relative path.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: TypeScript (extension + shared)
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (extension + shared)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @inkwell/shared build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Prettier format check
        run: pnpm format:check

      - name: Build extension
        run: pnpm --filter @inkwell/extension build

      - name: Verify no stray big files in extension dist
        run: |
          echo "Sizes:"
          find packages/extension/dist -type f -exec ls -l {} \; | awk '{print $5, $9}' | sort -n

  # ---------------------------------------------------------------------------
  # Backend: FastAPI (Python)
  # ---------------------------------------------------------------------------
  backend:
    name: backend (fastapi)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: mypy strict
        run: mypy src

      - name: pytest
        run: pytest
