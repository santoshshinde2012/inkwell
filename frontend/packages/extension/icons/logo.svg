<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Inkwell">
  <title>Inkwell</title>
  <!--
    Inkwell brand mark. A single ink drop on the indigo→violet brand
    gradient: the drop is the "ink", the rounded tile is the "well" that
    holds it. Deliberately flat and geometric so it stays crisp at 16px.
    This SVG is the master; frontend/packages/extension/scripts/generate-icons.sh
    rasterises it to the PNG sizes Chrome needs.
  -->
  <defs>
    <linearGradient id="inkwell-bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#inkwell-bg)"/>
  <path
    d="M64 26 C70 37 86 48 86 61 A28 28 0 1 1 42 61 C42 48 58 37 64 26 Z"
    fill="#ffffff"/>
</svg>
